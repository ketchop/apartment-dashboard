<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PapaParse for parsing CSV data -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
        }
        /* Custom scrollbar for the table */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-6 lg:p-8">

    <div class="max-w-[1400px] mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
            <div class="w-full md:w-auto">
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">🏢 우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-slate-500 mt-2 text-sm">구글 시트 실시간 연동 데이터</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto justify-end">
                <!-- 법정동 필터 드롭다운 -->
                <select id="dong-filter" class="hidden bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-green-500 focus:border-green-500 block p-2.5 font-semibold shadow-sm outline-none cursor-pointer w-full md:w-48 transition-colors hover:border-green-400">
                    <option value="all">📍 전체 동네</option>
                </select>

                <div id="loading-indicator" class="flex items-center text-green-600 font-medium bg-green-50 px-4 py-2 rounded-full whitespace-nowrap">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    불러오는 중...
                </div>
            </div>
        </header>

        <!-- Main 2-Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <!-- Left Column: Summary, Chart, Ranking -->
            <div class="lg:col-span-7 xl:col-span-8 flex flex-col gap-6">
                
                <!-- Summary Cards -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div class="text-slate-500 text-xs xl:text-sm font-semibold mb-1">🏠 총 거래 건수</div>
                        <div class="text-2xl xl:text-3xl font-bold text-slate-900" id="stat-count">-<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">건</span></div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div class="text-slate-500 text-xs xl:text-sm font-semibold mb-1">💰 평균 거래가</div>
                        <div class="text-2xl xl:text-3xl font-bold text-green-600" id="stat-avg">-<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">만원</span></div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div class="text-slate-500 text-xs xl:text-sm font-semibold mb-1">📈 최고 거래가</div>
                        <div class="text-2xl xl:text-3xl font-bold text-red-500" id="stat-max">-<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">만원</span></div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div class="text-slate-500 text-xs xl:text-sm font-semibold mb-1">📉 최저 거래가</div>
                        <div class="text-2xl xl:text-3xl font-bold text-blue-500" id="stat-min">-<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">만원</span></div>
                    </div>
                </div>

                <!-- Chart Section -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">📈 월별 평균 거래가격 추이</h2>
                    <div class="relative h-64 md:h-72 w-full">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>

                <!-- Top 5 Ranking Section -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">🏆 우리 동네 비싼 아파트 TOP 5</h2>
                    <div id="top-5-list" class="space-y-3 flex-grow pr-1">
                        <!-- Top 5 items will be inserted here dynamically -->
                    </div>
                </div>

            </div>

            <!-- Right Column: Table Section -->
            <div class="lg:col-span-5 xl:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[600px] lg:h-[840px]">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center shrink-0">
                    <h2 class="text-lg font-bold text-slate-800">📋 최근 실거래가 목록</h2>
                    <span class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded">최신 100건 표시</span>
                </div>
                <!-- Table Container with independent scrolling -->
                <div class="table-container overflow-y-auto overflow-x-auto flex-grow relative">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-slate-100 sticky top-0 z-10 shadow-sm">
                            <tr class="text-slate-600 text-sm border-b border-slate-200">
                                <th class="p-4 font-semibold">거래일자</th>
                                <th class="p-4 font-semibold">아파트명</th>
                                <th class="p-4 font-semibold">법정동</th>
                                <th class="p-4 font-semibold">전용(㎡)</th>
                                <th class="p-4 font-semibold">층</th>
                                <th class="p-4 font-semibold text-right">거래금액(만원)</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-sm text-slate-700 divide-y divide-slate-100">
                            <!-- Table rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Google Sheets CSV Export URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvpCB-5UAWtOxp2TYsrjVpP-UkAgKzaiNhSQ-BAV6cgV5ON8tyrOiO-lIKtsN4_t7JIYiKoFkWFsEj/pub?gid=0&single=true&output=csv';

        let globalValidData = []; // 전체 데이터를 저장할 변수

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

        // Fetch and Parse CSV Data
        function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processInitialData(results.data);
                },
                error: function(error) {
                    console.error('Error fetching data:', error);
                    document.getElementById('loading-indicator').innerHTML = '<span class="text-red-500">데이터를 불러오는데 실패했습니다.</span>';
                }
            });
        }

        // Process Initial Data and Setup Filter
        function processInitialData(rawData) {
            // 1. Data Cleaning & Parsing
            globalValidData = rawData.filter(row => row['거래금액(만원)'] && row['거래일자']).map(row => {
                // Parse Price (Remove commas if any)
                const priceStr = String(row['거래금액(만원)']).replace(/,/g, '').trim();
                const price = parseInt(priceStr, 10) || 0;
                
                // Parse Date to extract Month (YYYY-MM format)
                const dateStr = String(row['거래일자']).replace(/\D/g, ''); 
                let monthLabel = '기타';
                if (dateStr.length >= 6) {
                    monthLabel = `${dateStr.substring(0,4)}-${dateStr.substring(4,6)}`;
                }

                return {
                    ...row,
                    parsedPrice: price,
                    monthLabel: monthLabel,
                    originalDateStr: String(row['거래일자'])
                };
            });

            if (globalValidData.length === 0) {
                document.getElementById('loading-indicator').innerText = '유효한 데이터가 없습니다.';
                return;
            }

            // Hide loading indicator
            document.getElementById('loading-indicator').style.display = 'none';

            // 2. Setup Dropdown Filter
            const dongs = [...new Set(globalValidData.map(d => d['법정동']).filter(Boolean))].sort();
            const filterSelect = document.getElementById('dong-filter');
            
            dongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                filterSelect.appendChild(option);
            });

            filterSelect.classList.remove('hidden'); // Show filter

            // Add Event Listener for Filter
            filterSelect.addEventListener('change', (e) => {
                const selectedDong = e.target.value;
                if (selectedDong === 'all') {
                    updateDashboard(globalValidData);
                } else {
                    const filteredData = globalValidData.filter(d => d['법정동'] === selectedDong);
                    updateDashboard(filteredData);
                }
            });

            // 3. Initial Dashboard Render
            updateDashboard(globalValidData);
        }

        // Update Dashboard Components with Data
        function updateDashboard(data) {
            if (data.length === 0) {
                updateSummary(0, 0, 0, 0);
                renderChart([], []);
                renderTop5([]);
                renderTable([]);
                return;
            }

            // 1. Calculate Summary Statistics
            const prices = data.map(d => d.parsedPrice);
            const totalCount = data.length;
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const avgPrice = Math.round(prices.reduce((sum, val) => sum + val, 0) / totalCount);

            updateSummary(totalCount, avgPrice, maxPrice, minPrice);

            // 2. Prepare Chart Data (Monthly Average)
            const monthlyStats = {};
            data.forEach(d => {
                if (!monthlyStats[d.monthLabel]) {
                    monthlyStats[d.monthLabel] = { sum: 0, count: 0 };
                }
                monthlyStats[d.monthLabel].sum += d.parsedPrice;
                monthlyStats[d.monthLabel].count += 1;
            });

            // Sort months chronologically
            const labels = Object.keys(monthlyStats).sort();
            const avgPrices = labels.map(label => Math.round(monthlyStats[label].sum / monthlyStats[label].count));

            renderChart(labels, avgPrices);

            // 3. Render Top 5 Ranking
            renderTop5(data);

            // 4. Populate Table (Sort by date descending, limit to 100)
            const sortedData = [...data].sort((a, b) => {
                const dateA = a.originalDateStr.replace(/\D/g, '');
                const dateB = b.originalDateStr.replace(/\D/g, '');
                return dateB.localeCompare(dateA);
            });

            renderTable(sortedData.slice(0, 100));
        }

        // Update Summary Cards UI
        function updateSummary(count, avg, max, min) {
            document.getElementById('stat-count').innerHTML = `${count.toLocaleString()}<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">건</span>`;
            document.getElementById('stat-avg').innerHTML = `${avg.toLocaleString()}<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">만원</span>`;
            document.getElementById('stat-max').innerHTML = `${max.toLocaleString()}<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">만원</span>`;
            document.getElementById('stat-min').innerHTML = `${min.toLocaleString()}<span class="text-sm xl:text-lg text-slate-500 font-normal ml-1">만원</span>`;
        }

        // Render Chart using Chart.js
        let myChart = null;
        function renderChart(labels, data) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            // Destroy existing chart instance if exists
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래가격 (만원)',
                        data: data,
                        borderColor: '#16a34a', // text-green-600
                        backgroundColor: 'rgba(22, 163, 74, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#16a34a',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3 // smooth curves
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    plugins: {
                        legend: {
                            display: false // Hide legend for cleaner look
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { family: 'Pretendard', size: 13 },
                            bodyFont: { family: 'Pretendard', size: 14, weight: 'bold' },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toLocaleString() + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { font: { family: 'Pretendard' }, color: '#64748b' }
                        },
                        y: {
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: {
                                font: { family: 'Pretendard' },
                                color: '#64748b',
                                callback: function(value) {
                                    return value.toLocaleString() + '만';
                                }
                            },
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // Render Top 5 Ranking
        function renderTop5(data) {
            const container = document.getElementById('top-5-list');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-500 py-8">해당 조건의 거래 내역이 없습니다.</div>';
                return;
            }

            // Sort descending by price and get top 5
            const sortedDesc = [...data].sort((a, b) => b.parsedPrice - a.parsedPrice);
            const top5 = sortedDesc.slice(0, 5);

            top5.forEach((row, index) => {
                const rank = index + 1;
                let rankColorClass = 'bg-slate-100 text-slate-500'; // 4위, 5위 기본 색상
                let rowBgClass = 'bg-white border-slate-100';
                
                // 금, 은, 동 강조
                if (rank === 1) {
                    rankColorClass = 'bg-[#FFD700] text-yellow-900 ring-2 ring-yellow-200 shadow-sm';
                    rowBgClass = 'bg-yellow-50/30 border-yellow-200';
                } else if (rank === 2) {
                    rankColorClass = 'bg-[#C0C0C0] text-slate-800 ring-2 ring-slate-200 shadow-sm';
                    rowBgClass = 'bg-slate-50 border-slate-200';
                } else if (rank === 3) {
                    rankColorClass = 'bg-[#CD7F32] text-orange-900 ring-2 ring-orange-200 shadow-sm';
                    rowBgClass = 'bg-orange-50/30 border-orange-200';
                }

                const name = escapeHTML(row['아파트명'] || '-');
                const area = escapeHTML(row['전용면적(㎡)'] || '-');
                const floor = escapeHTML(row['층'] || '-');
                const price = row.parsedPrice ? row.parsedPrice.toLocaleString() : '-';

                const priceClass = row.parsedPrice >= 50000 
                    ? 'text-red-500 font-extrabold' 
                    : 'text-green-600 font-bold';

                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-3 rounded-xl border ${rowBgClass} transition-all hover:shadow-md`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full font-bold text-sm ${rankColorClass}">
                            ${rank}
                        </div>
                        <div>
                            <div class="font-bold text-slate-900 text-sm truncate max-w-[120px] lg:max-w-[100px] xl:max-w-[180px]" title="${name}">${name} <span class="text-xs text-slate-500 font-normal ml-1">${floor}층</span></div>
                            <div class="text-xs text-slate-500 mt-0.5">전용 ${area}㎡</div>
                        </div>
                    </div>
                    <div class="text-right ${priceClass} text-sm sm:text-base">
                        ${price}<span class="text-xs font-normal text-slate-500 ml-0.5">만원</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Render Data Table
        function renderTable(dataSlice) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // Clear existing

            if (dataSlice.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-500">해당 조건의 거래 내역이 없습니다.</td></tr>`;
                return;
            }

            dataSlice.forEach(row => {
                const tr = document.createElement('tr');
                // 짝수 행 배경색 (줄무늬) 및 마우스 오버 시 색상 변경
                tr.className = 'even:bg-slate-50 hover:bg-green-50 transition-colors cursor-default';
                
                // Formatting values securely
                const date = escapeHTML(row['거래일자'] || '-');
                const name = escapeHTML(row['아파트명'] || '-');
                const dong = escapeHTML(row['법정동'] || '-');
                const area = escapeHTML(row['전용면적(㎡)'] || '-');
                const floor = escapeHTML(row['층'] || '-');
                const price = row.parsedPrice ? row.parsedPrice.toLocaleString() : '-';
                
                // 가로 공간을 아끼기 위해 건축년도는 제외하거나 말줄임 처리 (여기선 2단 레이아웃을 위해 테이블 열을 약간 간소화함)

                // 거래금액 5억(50,000만원) 이상 빨간색 강조
                const priceClass = row.parsedPrice >= 50000 
                    ? 'text-red-500 font-extrabold' 
                    : 'text-green-600 font-bold';

                tr.innerHTML = `
                    <td class="p-4 text-xs xl:text-sm text-slate-500">${date}</td>
                    <td class="p-4 font-bold text-slate-900 text-sm xl:text-base truncate max-w-[100px] xl:max-w-[150px]" title="${name}">${name}</td>
                    <td class="p-4 text-xs xl:text-sm">${dong}</td>
                    <td class="p-4 text-xs xl:text-sm">${area}</td>
                    <td class="p-4 text-xs xl:text-sm">${floor}</td>
                    <td class="p-4 text-right ${priceClass} text-sm xl:text-base">${price}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Helper function to escape HTML to prevent XSS
        function escapeHTML(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
